<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harvester Pro | রফিক এন্টারপ্রাইজ</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

    <style>
        :root {
            --bg: #0a0f1d;
            --card: rgba(255, 255, 255, 0.06);
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.3);
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-glow {
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .bottom-nav {
            background: rgba(10, 15, 29, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .btn-active {
            transform: scale(0.95);
        }

        .tab-active {
            color: var(--accent);
            position: relative;
        }
        
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: var(--accent);
            border-radius: 50%;
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="pb-24">

    <!-- App Header -->
    <header class="p-6 sticky top-0 z-50 bg-[#0a0f1d]/80 backdrop-blur-md flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-tight">HARVESTER <span class="text-green-500">PRO</span></h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">রফিক এন্টারপ্রাইজ</p>
        </div>
        <div id="sync-indicator" class="flex items-center gap-2 px-3 py-1 bg-green-500/10 rounded-full border border-green-500/20">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-[10px] text-green-500 font-bold uppercase">Offline</span>
        </div>
    </header>

    <!-- Main Viewport -->
    <main id="app-view" class="px-5 space-y-6">
        <!-- Views are injected here -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 h-20 bottom-nav z-50 flex justify-around items-center px-4">
        <button onclick="router.navigate('home')" class="nav-item flex flex-col items-center gap-1 opacity-50" id="nav-home">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px]">হোম</span>
        </button>
        <button onclick="router.navigate('add')" class="relative -top-8 w-14 h-14 bg-green-500 rounded-full flex items-center justify-center shadow-lg shadow-green-500/40 neon-glow" id="nav-add">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
        </button>
        <button onclick="router.navigate('records')" class="nav-item flex flex-col items-center gap-1 opacity-50" id="nav-records">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            <span class="text-[10px]">হিসাব</span>
        </button>
    </nav>

    <script>
        /**
         * 1. DATABASE SYSTEM (IndexedDB via Dexie)
         */
        const db = new Dexie("HarvesterDB");
        db.version(1).stores({
            records: '++id, name, total_gonda, rate, total_amount, paid_amount, due_amount, date'
        });

        /**
         * 2. CORE CONVERSION LOGIC
         */
        const Converter = {
            toGonda: (qty, unit) => {
                const val = parseFloat(qty) || 0;
                if (unit === 'kani') return val * 20;
                if (unit === 'katha') return val * 5;
                return val;
            },
            fromGonda: (totalGonda) => {
                const kani = Math.floor(totalGonda / 20);
                const remaining = totalGonda % 20;
                const katha = Math.floor(remaining / 5);
                const gonda = remaining % 5;
                
                let str = [];
                if (kani > 0) str.push(`${kani} কানি`);
                if (katha > 0) str.push(`${katha} কাঠা`);
                if (gonda > 0 || str.length === 0) str.push(`${gonda} গন্ডা`);
                return str.join(' ');
            },
            formatMoney: (num) => `৳${Number(num).toLocaleString('bn-BD')}`
        };

        /**
         * 3. UI STATE & ROUTER
         */
        const router = {
            current: 'home',
            navigate: function(view) {
                this.current = view;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.add('opacity-50'));
                const active = document.getElementById(`nav-${view}`);
                if (active) active.classList.remove('opacity-50');
                
                this.render();
                gsap.from("#app-view", { opacity: 0, y: 20, duration: 0.4, ease: "power2.out" });
            },
            render: async function() {
                const viewEl = document.getElementById('app-view');
                if (this.current === 'home') viewEl.innerHTML = await Views.home();
                if (this.current === 'add') viewEl.innerHTML = Views.add();
                if (this.current === 'records') viewEl.innerHTML = await Views.records();
                
                if (this.current === 'home') initHomeCharts();
            }
        };

        /**
         * 4. VIEWS
         */
        const Views = {
            home: async () => {
                const all = await db.records.toArray();
                const todayStr = new Date().toISOString().split('T')[0];
                const today = all.filter(r => r.date === todayStr);

                const stats = {
                    todaySales: today.reduce((s, r) => s + r.total_amount, 0),
                    todayCash: today.reduce((s, r) => s + r.paid_amount, 0),
                    todayDue: today.reduce((s, r) => s + r.due_amount, 0),
                    allSales: all.reduce((s, r) => s + r.total_amount, 0),
                    allDue: all.reduce((s, r) => s + r.due_amount, 0),
                };

                return `
                    <div class="space-y-6">
                        <!-- Dashboard Cards -->
                        <div class="grid grid-cols-2 gap-4">
                            <div class="glass p-4 rounded-3xl border-l-4 border-green-500">
                                <p class="text-[10px] text-gray-400 uppercase">আজকের বিক্রি</p>
                                <h2 class="text-lg font-bold">${Converter.formatMoney(stats.todaySales)}</h2>
                            </div>
                            <div class="glass p-4 rounded-3xl border-l-4 border-orange-500">
                                <p class="text-[10px] text-gray-400 uppercase">আজকের বাকি</p>
                                <h2 class="text-lg font-bold">${Converter.formatMoney(stats.todayDue)}</h2>
                            </div>
                        </div>

                        <!-- All Time Summary -->
                        <div class="glass p-6 rounded-[2rem] bg-gradient-to-br from-green-500/10 to-transparent">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="text-xs text-gray-400">মোট ব্যবসা (সর্বমোট)</p>
                                    <h1 class="text-3xl font-black text-white">${Converter.formatMoney(stats.allSales)}</h1>
                                </div>
                                <div class="p-3 bg-white/5 rounded-2xl">
                                    <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                                </div>
                            </div>
                            <div class="h-px bg-white/10 w-full mb-4"></div>
                            <div class="flex justify-between">
                                <div>
                                    <p class="text-[10px] text-gray-500 uppercase font-bold">মোট বাকি</p>
                                    <p class="text-red-400 font-bold">${Converter.formatMoney(stats.allDue)}</p>
                                </div>
                                <button onclick="router.navigate('records')" class="text-xs bg-white/10 px-4 py-2 rounded-full active:scale-90 transition-all">রিপোর্ট দেখুন</button>
                            </div>
                        </div>

                        <!-- Charts Section -->
                        <div class="glass p-5 rounded-3xl">
                            <h3 class="text-sm font-bold mb-4 flex items-center gap-2">
                                <span class="w-1 h-4 bg-green-500 rounded-full"></span> আয় ও ব্যয়ের অনুপাত
                            </h3>
                            <canvas id="mainChart" height="200"></canvas>
                        </div>
                    </div>
                `;
            },

            add: () => {
                return `
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-green-500 rounded-2xl flex items-center justify-center">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                            </div>
                            <h2 class="text-xl font-bold">নতুন হিসাব যোগ করুন</h2>
                        </div>

                        <form id="addForm" class="space-y-4" oninput="handleLiveCalc()">
                            <div class="space-y-1">
                                <label class="text-xs text-gray-400 ml-2">গ্রাহকের নাম</label>
                                <input type="text" id="custName" required class="w-full p-4 rounded-2xl" placeholder="নাম লিখুন">
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-xs text-gray-400 ml-2">জমির পরিমাণ</label>
                                    <input type="number" id="qty" required class="w-full p-4 rounded-2xl" placeholder="0.00">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-xs text-gray-400 ml-2">ধরন</label>
                                    <select id="unit" class="w-full p-4 rounded-2xl">
                                        <option value="kani">কানি</option>
                                        <option value="katha">কাঠা</option>
                                        <option value="gonda">গন্ডা</option>
                                    </select>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-xs text-gray-400 ml-2">রেট (৳)</label>
                                    <input type="number" id="rate" required class="w-full p-4 rounded-2xl" placeholder="0">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-xs text-gray-400 ml-2">নগদ সংগ্রহ (৳)</label>
                                    <input type="number" id="paid" class="w-full p-4 rounded-2xl border-green-500/30" placeholder="0">
                                </div>
                            </div>

                            <div class="space-y-1">
                                <label class="text-xs text-gray-400 ml-2">তারিখ</label>
                                <input type="date" id="date" value="${new Date().toISOString().split('T')[0]}" class="w-full p-4 rounded-2xl">
                            </div>

                            <!-- Live Preview -->
                            <div id="previewCard" class="glass p-5 rounded-3xl border-2 border-green-500/20 bg-green-500/5 hidden">
                                <p class="text-[10px] text-green-500 font-bold uppercase mb-3">Live Preview</p>
                                <div class="flex justify-between items-center">
                                    <div>
                                        <h4 id="prevName" class="font-bold">-</h4>
                                        <p id="prevLand" class="text-xs text-gray-400">-</p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-[10px] text-gray-500">মোট বিল</p>
                                        <h4 id="prevTotal" class="text-xl font-black text-green-500">৳০</h4>
                                    </div>
                                </div>
                                <div class="mt-4 pt-4 border-t border-white/5 flex justify-between">
                                    <span class="text-xs text-red-400 font-bold" id="prevDue">বাকি: ৳০</span>
                                    <span class="text-xs text-green-400" id="prevPaid">নগদ: ৳০</span>
                                </div>
                            </div>

                            <button type="submit" class="w-full py-5 bg-green-500 rounded-2xl font-bold text-lg shadow-lg shadow-green-500/30 active:scale-95 transition-all">সংরক্ষণ করুন</button>
                        </form>
                    </div>
                `;
            },

            records: async () => {
                let data = await db.records.reverse().toArray();
                window.currentDataList = data; // Store for filtering

                return `
                    <div class="space-y-4">
                        <div class="flex gap-2">
                            <input type="text" id="search" oninput="handleSearch(this.value)" placeholder="নাম দিয়ে খুঁজুন..." class="flex-1 p-4 rounded-2xl glass">
                            <button onclick="toggleBakiFilter()" id="bakiFilterBtn" class="px-6 rounded-2xl glass font-bold text-xs transition-all">বাকি</button>
                        </div>

                        <!-- Export Actions -->
                        <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                            <button onclick="exportExcel()" class="whitespace-nowrap px-4 py-2 bg-white/5 border border-white/10 rounded-full text-[10px] uppercase font-bold">Excel Export</button>
                            <button onclick="exportPDF()" class="whitespace-nowrap px-4 py-2 bg-white/5 border border-white/10 rounded-full text-[10px] uppercase font-bold">PDF Report</button>
                        </div>

                        <div id="record-list" class="space-y-3">
                            ${renderRecordItems(data)}
                        </div>
                    </div>
                `;
            }
        };

        /**
         * 5. LOGIC & HANDLERS
         */
        let bakiOnly = false;
        function toggleBakiFilter() {
            bakiOnly = !bakiOnly;
            const btn = document.getElementById('bakiFilterBtn');
            const data = bakiOnly ? window.currentDataList.filter(r => r.due_amount > 0) : window.currentDataList;
            
            btn.classList.toggle('bg-orange-500/20', bakiOnly);
            btn.classList.toggle('text-orange-500', bakiOnly);
            btn.classList.toggle('border-orange-500/50', bakiOnly);
            
            document.getElementById('record-list').innerHTML = renderRecordItems(data);
        }

        function handleSearch(val) {
            const term = val.toLowerCase();
            const data = window.currentDataList.filter(r => r.name.toLowerCase().includes(term));
            document.getElementById('record-list').innerHTML = renderRecordItems(data);
        }

        function renderRecordItems(items) {
            if(items.length === 0) return `<p class="text-center text-gray-500 py-10">কোন রেকর্ড পাওয়া যায়নি</p>`;
            return items.map(item => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center animate-in slide-in-from-bottom-2">
                    <div>
                        <h4 class="font-bold">${item.name}</h4>
                        <p class="text-[10px] text-gray-400">${item.date} • ${Converter.fromGonda(item.total_gonda)}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-green-500">${Converter.formatMoney(item.total_amount)}</p>
                        ${item.due_amount > 0 ? `<p class="text-[10px] font-bold text-orange-500 italic">বাকি: ${Converter.formatMoney(item.due_amount)}</p>` : `<p class="text-[10px] text-gray-500">পরিশোধিত</p>`}
                    </div>
                </div>
            `).join('');
        }

        function handleLiveCalc() {
            const name = document.getElementById('custName').value;
            const qty = document.getElementById('qty').value;
            const unit = document.getElementById('unit').value;
            const rate = document.getElementById('rate').value;
            const paid = document.getElementById('paid').value || 0;

            if (qty && rate) {
                document.getElementById('previewCard').classList.remove('hidden');
                const totalG = Converter.toGonda(qty, unit);
                
                // Final calculation based on unit chosen vs price
                // If rate is per decimal of kani/katha/gonda
                const totalAmt = (totalG / (unit === 'kani' ? 20 : unit === 'katha' ? 5 : 1)) * rate;
                const due = totalAmt - paid;

                document.getElementById('prevName').innerText = name || 'গ্রাহকের নাম';
                document.getElementById('prevLand').innerText = Converter.fromGonda(totalG);
                document.getElementById('prevTotal').innerText = Converter.formatMoney(totalAmt);
                document.getElementById('prevPaid').innerText = `নগদ: ${Converter.formatMoney(paid)}`;
                document.getElementById('prevDue').innerText = `বাকি: ${Converter.formatMoney(due)}`;
            }
        }

        // Add Record Handler
        document.addEventListener('submit', async (e) => {
            if (e.target.id === 'addForm') {
                e.preventDefault();
                const qty = document.getElementById('qty').value;
                const unit = document.getElementById('unit').value;
                const rate = document.getElementById('rate').value;
                const paid = parseFloat(document.getElementById('paid').value) || 0;
                
                const totalG = Converter.toGonda(qty, unit);
                const totalAmt = (totalG / (unit === 'kani' ? 20 : unit === 'katha' ? 5 : 1)) * rate;

                const newRecord = {
                    name: document.getElementById('custName').value,
                    total_gonda: totalG,
                    rate: parseFloat(rate),
                    total_amount: totalAmt,
                    paid_amount: paid,
                    due_amount: totalAmt - paid,
                    date: document.getElementById('date').value
                };

                await db.records.add(newRecord);
                
                // Succes Animation
                gsap.to("body", { backgroundColor: "#064e3b", duration: 0.1, yoyo: true, repeat: 1 });
                router.navigate('records');
            }
        });

        /**
         * 6. CHARTS & EXPORTS
         */
        function initHomeCharts() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            db.records.toArray().then(data => {
                const totalPaid = data.reduce((s, r) => s + r.paid_amount, 0);
                const totalDue = data.reduce((s, r) => s + r.due_amount, 0);

                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['নগদ', 'বাকি'],
                        datasets: [{
                            data: [totalPaid, totalDue],
                            backgroundColor: ['#22c55e', '#f97316'],
                            borderWidth: 0,
                            hoverOffset: 10
                        }]
                    },
                    options: {
                        plugins: { legend: { position: 'bottom', labels: { color: '#888', font: { family: 'Hind Siliguri' } } } },
                        cutout: '70%'
                    }
                });
            });
        }

        async function exportExcel() {
            const data = await db.records.toArray();
            const ws = XLSX.utils.json_to_sheet(data.map(r => ({
                'নাম': r.name,
                'জমি': Converter.fromGonda(r.total_gonda),
                'মোট বিল': r.total_amount,
                'নগদ': r.paid_amount,
                'বাকি': r.due_amount,
                'তারিখ': r.date
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, "Harvester_Pro_Report.xlsx");
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const data = await db.records.toArray();
            
            doc.text("HARVESTER PRO - Rafiq Enterprise", 10, 10);
            doc.text("Financial Statement", 10, 20);
            
            let y = 30;
            data.forEach((r, i) => {
                doc.text(`${i+1}. ${r.name} - Total: ${r.total_amount} - Due: ${r.due_amount}`, 10, y);
                y += 10;
            });
            doc.save("Report.pdf");
        }

        // Initialize App
        router.navigate('home');
    </script>
</body>
</html>
