<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HARVESTER PRO — রফিক এন্টারপ্রাইজ</title>
    
    <!-- Fonts & Scripts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Apple Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .tab-active {
            background: rgba(255, 255, 255, 0.1) !important;
            color: #38bdf8 !important;
            border-top: 2px solid #38bdf8;
        }

        /* Mobile Layout */
        .safe-area { padding-bottom: calc(constant(safe-area-inset-bottom) + 80px); padding-bottom: calc(env(safe-area-inset-bottom) + 80px); }
        
        .tab-content { display: none; }
        .active { display: block; }

        input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 14px !important;
            padding: 12px 16px !important;
            color: white !important;
            outline: none !important;
        }

        input:focus { border-color: #38bdf8 !important; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }

        .btn-primary {
            background: linear-gradient(90deg, #0ea5e9, #2563eb);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body class="safe-area">

    <!-- Header -->
    <header class="p-5 flex justify-between items-center sticky top-0 z-50 glass rounded-b-3xl border-none">
        <div>
            <p class="text-xs text-blue-400 font-bold tracking-widest uppercase">System Active</p>
            <h1 class="text-xl font-bold">রফিক এন্টারপ্রাইজ</h1>
        </div>
        <div class="h-10 w-10 glass rounded-full flex items-center justify-center border-blue-500/30">
            <span class="text-blue-400 text-lg">🌾</span>
        </div>
    </header>

    <!-- Content Sections -->
    <div id="main-content" class="p-4 space-y-6">
        
        <!-- Tab 1: Home Dashboard -->
        <section id="home" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="glass p-5 rounded-[24px] col-span-2">
                    <p class="text-gray-400 text-sm">মোট বিক্রি (আজ)</p>
                    <h2 class="text-4xl font-bold mt-2">৳ <span id="stat-total">0</span></h2>
                </div>
                <div class="glass p-4 rounded-[22px]">
                    <p class="text-gray-400 text-xs">মোট নগদ</p>
                    <h3 class="text-lg font-bold text-green-400">৳ <span id="stat-cash">0</span></h3>
                </div>
                <div class="glass p-4 rounded-[22px]">
                    <p class="text-gray-400 text-xs">মোট বাকি</p>
                    <h3 class="text-lg font-bold text-red-400">৳ <span id="stat-due">0</span></h3>
                </div>
                <div class="glass p-4 rounded-[22px] col-span-2">
                    <p class="text-gray-400 text-xs">মোট গন্ডা কাটা হয়েছে</p>
                    <h3 class="text-lg font-bold text-blue-400"><span id="stat-gonda">0</span> গন্ডা</h3>
                </div>
            </div>
        </section>

        <!-- Tab 2: Customers Entry -->
        <section id="customers" class="tab-content space-y-5">
            <div class="glass p-6 rounded-[28px] border-white/5">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="w-1.5 h-5 bg-blue-500 rounded-full"></span> নতুন এন্ট্রি
                </h2>
                <div class="space-y-4">
                    <input type="text" id="cust-name" placeholder="কাস্টমারের নাম" class="w-full">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="cust-gonda" oninput="calculateLive()" placeholder="গন্ডা">
                        <input type="number" id="cust-rate" oninput="calculateLive()" placeholder="রেট">
                    </div>
                    <input type="number" id="cust-cash" oninput="calculateLive()" placeholder="নগদ জমা (না থাকলে ০)">
                    
                    <div class="p-4 rounded-2xl bg-white/5 border border-dashed border-white/10">
                        <div class="flex justify-between text-sm"><span class="text-gray-400">মোট টাকা:</span> <span id="view-total">৳ ০</span></div>
                        <div class="flex justify-between text-sm font-bold"><span class="text-gray-400">বাকি:</span> <span id="view-due" class="text-red-400">৳ ০</span></div>
                    </div>

                    <button onclick="saveData()" class="w-full btn-primary py-4 rounded-2xl font-bold text-white transition-all active:scale-95">
                        সেভ করুন
                    </button>
                </div>
            </div>

            <!-- List Filter -->
            <div class="flex justify-between items-center px-1">
                <h3 class="font-bold">কাস্টমার তালিকা</h3>
                <button onclick="toggleDueFilter()" id="filter-btn" class="text-xs glass px-4 py-2 rounded-full border-blue-500/20 text-blue-400">সব কাস্টমার</button>
            </div>

            <div id="customer-list" class="space-y-3">
                <!-- Data will appear here -->
            </div>
        </section>

        <!-- Tab 3: Reports -->
        <section id="reports" class="tab-content">
            <div class="glass p-8 rounded-[30px] text-center space-y-6">
                <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto">
                    <span class="text-2xl">📊</span>
                </div>
                <h2 class="text-xl font-bold">রিপোর্ট ডাউনলোড</h2>
                <p class="text-sm text-gray-400">আপনার সকল তথ্য ব্যাকআপ রাখার জন্য ফাইল ডাউনলোড করুন।</p>
                <button onclick="exportJSON()" class="w-full glass py-4 rounded-2xl font-bold border-white/10 hover:bg-white/5 transition-all">
                    JSON ব্যাকআপ ফাইল
                </button>
            </div>
        </section>

    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 glass h-20 rounded-t-3xl border-none flex justify-around items-center px-6 z-50">
        <button onclick="switchTab('home')" id="tab-home" class="flex flex-col items-center gap-1 text-gray-500 transition-all p-2 rounded-xl">
            <span>🏠</span>
            <span class="text-[10px] font-bold">হোম</span>
        </button>
        <button onclick="switchTab('customers')" id="tab-customers" class="flex flex-col items-center gap-1 text-gray-500 transition-all p-2 rounded-xl">
            <span>👥</span>
            <span class="text-[10px] font-bold">কাস্টমার</span>
        </button>
        <button onclick="switchTab('reports')" id="tab-reports" class="flex flex-col items-center gap-1 text-gray-500 transition-all p-2 rounded-xl">
            <span>📄</span>
            <span class="text-[10px] font-bold">রিপোর্ট</span>
        </button>
    </nav>

    <script>
        let db;
        let showOnlyDue = false;

        // --- Database Initialize ---
        const request = indexedDB.open("HarvesterDB", 2);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("entries")) {
                db.createObjectStore("entries", { keyPath: "id", autoIncrement: true });
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            refreshUI();
        };

        // --- Tabs ---
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('tab-active'));
            
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('tab-active');
            
            gsap.from("#"+id, { opacity: 0, y: 15, duration: 0.4 });
            refreshUI();
        }

        // --- Logic ---
        function calculateLive() {
            const gonda = parseFloat(document.getElementById('cust-gonda').value) || 0;
            const rate = parseFloat(document.getElementById('cust-rate').value) || 0;
            const cash = parseFloat(document.getElementById('cust-cash').value) || 0;
            const total = gonda * rate;
            const due = total - cash;

            document.getElementById('view-total').innerText = '৳ ' + total.toLocaleString('bn-BD');
            document.getElementById('view-due').innerText = '৳ ' + due.toLocaleString('bn-BD');
        }

        function saveData() {
            const name = document.getElementById('cust-name').value;
            const gonda = parseFloat(document.getElementById('cust-gonda').value) || 0;
            const rate = parseFloat(document.getElementById('cust-rate').value) || 0;
            const cash = parseFloat(document.getElementById('cust-cash').value) || 0;

            if(!name || gonda <= 0 || rate <= 0) {
                alert("দয়া করে সব তথ্য সঠিক দিন");
                return;
            }

            const total = gonda * rate;
            const due = total - cash;
            const entry = { name, gonda, rate, cash, total, due, date: new Date().toLocaleDateString('bn-BD') };

            const tx = db.transaction("entries", "readwrite");
            const store = tx.objectStore("entries");
            store.add(entry);

            tx.oncomplete = () => {
                resetForm();
                refreshUI();
                alert("সংরক্ষণ করা হয়েছে!");
            };
        }

        function resetForm() {
            document.getElementById('cust-name').value = '';
            document.getElementById('cust-gonda').value = '';
            document.getElementById('cust-rate').value = '';
            document.getElementById('cust-cash').value = '';
            calculateLive();
        }

        function refreshUI() {
            if (!db) return;
            const tx = db.transaction("entries", "readonly");
            const store = tx.objectStore("entries");
            const req = store.getAll();

            req.onsuccess = () => {
                const data = req.result;
                updateStats(data);
                renderList(data);
            };
        }

        function updateStats(data) {
            let total = 0, cash = 0, due = 0, gonda = 0;
            data.forEach(item => {
                total += item.total;
                cash += item.cash;
                due += item.due;
                gonda += item.gonda;
            });
            document.getElementById('stat-total').innerText = total.toLocaleString('bn-BD');
            document.getElementById('stat-cash').innerText = cash.toLocaleString('bn-BD');
            document.getElementById('stat-due').innerText = due.toLocaleString('bn-BD');
            document.getElementById('stat-gonda').innerText = gonda.toLocaleString('bn-BD');
        }

        function renderList(data) {
            const container = document.getElementById('customer-list');
            container.innerHTML = '';
            
            let filtered = showOnlyDue ? data.filter(d => d.due > 0) : data;

            filtered.reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = "glass p-4 rounded-2xl flex justify-between items-center";
                card.innerHTML = `
                    <div>
                        <p class="font-bold text-white">${item.name}</p>
                        <p class="text-[10px] text-gray-500">${item.date} • ${item.gonda} গন্ডা</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold ${item.due > 0 ? 'text-red-400' : 'text-green-400'}">৳ ${item.due}</p>
                        <p class="text-[9px] text-gray-500 uppercase tracking-tighter">বাকি টাকা</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleDueFilter() {
            showOnlyDue = !showOnlyDue;
            document.getElementById('filter-btn').innerText = showOnlyDue ? "শুধু বাকি" : "সব কাস্টমার";
            refreshUI();
        }

        function exportJSON() {
            const tx = db.transaction("entries", "readonly");
            const store = tx.objectStore("entries");
            store.getAll().onsuccess = (e) => {
                const data = JSON.stringify(e.target.result, null, 2);
                const blob = new Blob([data], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Harvester_Backup_${new Date().toLocaleDateString()}.json`;
                a.click();
            };
        }

        // Init Tab
        switchTab('home');
    </script>
</body>
</html>
