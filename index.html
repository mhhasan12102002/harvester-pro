<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harvester Pro | রফিক এন্টারপ্রাইজ</title>
    
    <!-- Google Fonts: Hind Siliguri -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Frameworks & Animation -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- Charts & Data Management -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    
    <!-- Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            deep: '#0f172a',
                            light: '#1e293b',
                            accent: '#22c55e',
                            danger: '#ef4444',
                            warning: '#f59e0b'
                        }
                    },
                    fontFamily: {
                        sans: ['Hind Siliguri', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Glassmorphism Styles */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Modern Gradient */
        .accent-gradient {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        .neon-glow {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }

        /* Hide scrollbars but allow scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Input Styles */
        input, textarea, select {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.1);
        }

        /* Button Active State */
        .btn-press:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="font-sans">

    <!-- App Shell Container -->
    <div id="app" class="relative min-h-screen max-w-md mx-auto flex flex-col">
        
        <!-- Viewport (Content Area) -->
        <main id="main-content" class="flex-grow pb-24 overflow-y-auto no-scrollbar">
            <!-- Content will be injected here by Module 2+ -->
        </main>

        <!-- Bottom Navigation (Placeholders for now) -->
        <nav class="fixed bottom-0 left-0 right-0 h-20 glass-nav flex justify-around items-center px-6 z-50 max-w-md mx-auto">
            <button class="flex flex-col items-center gap-1 text-brand-accent">
                <div class="p-2">🏠</div>
                <span class="text-[10px]">হোম</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-400">
                <div class="p-2">📋</div>
                <span class="text-[10px]">হিসাব</span>
            </button>
            <div class="-mt-12">
                <button class="w-14 h-14 accent-gradient rounded-full flex items-center justify-center neon-glow shadow-lg btn-press">
                    <span class="text-2xl text-white">+</span>
                </button>
            </div>
            <button class="flex flex-col items-center gap-1 text-slate-400">
                <div class="p-2">📈</div>
                <span class="text-[10px]">রিপোর্ট</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-400">
                <div class="p-2">⚙️</div>
                <span class="text-[10px]">সেটিংস</span>
            </button>
        </nav>

    </div>

    <script>
        console.log("✅ Module 1: Project Setup Complete.");
    </script>
</body>
</html>
