<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HARVESTER PRO - ধান কাটার হিসাব</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { border-bottom: 3px solid #fbbf24; color: #fbbf24; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen overflow-x-hidden">

    <!-- Header -->
    <header class="bg-gray-800 p-4 sticky top-0 z-50 shadow-lg border-b border-gray-700">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold text-yellow-500">🌾 HARVESTER PRO</h1>
            <button onclick="exportData()" class="bg-gray-700 p-2 rounded-lg text-sm border border-gray-600 active:scale-95 transition">
                📥 ব্যাকআপ
            </button>
        </div>
    </header>

    <main class="p-4 space-y-6 pb-24">
        
        <!-- Summary Dashboard -->
        <section class="grid grid-cols-2 gap-3">
            <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700 shadow-sm">
                <p class="text-gray-400 text-xs">আজকের মোট বিক্রি</p>
                <p id="stat-total" class="text-xl font-bold text-blue-400">৳0</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700 shadow-sm">
                <p class="text-gray-400 text-xs">আজকের মোট নগদ</p>
                <p id="stat-cash" class="text-xl font-bold text-green-400">৳0</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700 shadow-sm">
                <p class="text-gray-400 text-xs">আজকের মোট বাকি</p>
                <p id="stat-due" class="text-xl font-bold text-red-400">৳0</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700 shadow-sm">
                <p class="text-gray-400 text-xs">আজকের মোট গন্ডা</p>
                <p id="stat-gonda" class="text-xl font-bold text-yellow-400">0</p>
            </div>
        </section>

        <!-- Add Customer Form -->
        <section class="bg-gray-800 p-5 rounded-2xl border border-gray-700 shadow-md">
            <h2 class="text-lg font-semibold mb-4 flex items-center">➕ নতুন হিসাব যোগ করুন</h2>
            <div class="space-y-4">
                <input type="text" id="cust-name" placeholder="কাস্টমারের নাম" class="w-full bg-gray-900 border border-gray-600 p-3 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="cust-gonda" oninput="calculateLive()" placeholder="গন্ডা" class="bg-gray-900 border border-gray-600 p-3 rounded-xl outline-none">
                    <input type="number" id="cust-rate" oninput="calculateLive()" placeholder="রেট (৳)" class="bg-gray-900 border border-gray-600 p-3 rounded-xl outline-none">
                </div>

                <input type="number" id="cust-cash" oninput="calculateLive()" placeholder="নগদ জমা (ঐচ্ছিক)" class="w-full bg-gray-900 border border-gray-600 p-3 rounded-xl outline-none">
                
                <input type="date" id="cust-date" class="w-full bg-gray-900 border border-gray-600 p-3 rounded-xl outline-none text-gray-400">

                <!-- Live Preview -->
                <div id="preview" class="bg-gray-700/50 p-3 rounded-xl text-sm space-y-1 hidden border border-dashed border-gray-500 text-gray-300">
                    <div class="flex justify-between"><span>মোট টাকা:</span> <span id="pre-total">৳0</span></div>
                    <div class="flex justify-between font-bold text-red-400"><span>বাকি টাকা:</span> <span id="pre-due">৳0</span></div>
                </div>

                <button onclick="saveEntry()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 rounded-xl active:scale-95 transition text-lg shadow-lg">
                    হিসাব সংরক্ষণ করুন
                </button>
            </div>
        </section>

        <!-- List Header & Filter -->
        <section class="space-y-4">
            <div class="flex justify-between items-center">
                <h2 id="list-title" class="text-lg font-semibold">সকল কাস্টমার লিস্ট</h2>
                <button id="baki-filter-btn" onclick="toggleFilter()" class="bg-red-500/20 text-red-400 border border-red-500/30 px-4 py-1.5 rounded-full text-sm font-medium active:scale-90 transition">
                    বাকি কাস্টমার
                </button>
            </div>

            <!-- Customer List -->
            <div id="customer-list" class="space-y-3">
                <!-- Records will be injected here -->
            </div>
        </section>

    </main>

    <!-- Success Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-green-500 text-white px-6 py-2 rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none z-[60]">
        সফলভাবে সংরক্ষিত!
    </div>

    <script>
        // --- Database Setup ---
        let db;
        const dbName = "HarvesterProDB";
        let filterActive = false;

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            renderList();
            updateStats();
        };

        // --- Logic Functions ---

        // Set default date to today
        document.getElementById('cust-date').valueAsDate = new Date();

        function calculateLive() {
            const gonda = parseFloat(document.getElementById('cust-gonda').value) || 0;
            const rate = parseFloat(document.getElementById('cust-rate').value) || 0;
            const cash = parseFloat(document.getElementById('cust-cash').value) || 0;
            const preview = document.getElementById('preview');

            if(gonda > 0 && rate > 0) {
                const total = gonda * rate;
                const due = total - cash;
                
                preview.classList.remove('hidden');
                document.getElementById('pre-total').innerText = `৳${total}`;
                document.getElementById('pre-due').innerText = `৳${due}`;
            } else {
                preview.classList.add('hidden');
            }
        }

        async function saveEntry() {
            const name = document.getElementById('cust-name').value;
            const gonda = parseFloat(document.getElementById('cust-gonda').value) || 0;
            const rate = parseFloat(document.getElementById('cust-rate').value) || 0;
            const cash = parseFloat(document.getElementById('cust-cash').value) || 0;
            const date = document.getElementById('cust-date').value;

            if(!name || gonda <= 0 || rate <= 0) {
                alert("দয়া করে নাম, গন্ডা এবং রেট সঠিকভাবে লিখুন।");
                return;
            }

            const total = gonda * rate;
            const due = total - cash;

            const entry = { name, gonda, rate, cash, total, due, date, timestamp: new Date().getTime() };

            const transaction = db.transaction(["records"], "readwrite");
            transaction.objectStore("records").add(entry);

            transaction.oncomplete = () => {
                showToast();
                resetForm();
                renderList();
                updateStats();
            };
        }

        function resetForm() {
            document.getElementById('cust-name').value = '';
            document.getElementById('cust-gonda').value = '';
            document.getElementById('cust-rate').value = '';
            document.getElementById('cust-cash').value = '';
            document.getElementById('cust-date').valueAsDate = new Date();
            document.getElementById('preview').classList.add('hidden');
        }

        function renderList() {
            const listContainer = document.getElementById('customer-list');
            listContainer.innerHTML = '';

            const transaction = db.transaction(["records"], "readonly");
            const store = transaction.objectStore("records");
            
            store.openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const data = cursor.value;
                    
                    if (filterActive && data.due <= 0) {
                        cursor.continue();
                        return;
                    }

                    const card = document.createElement('div');
                    card.className = "bg-gray-800 p-4 rounded-2xl border border-gray-700 shadow-sm animate-in fade-in slide-in-from-bottom-2 duration-300";
                    card.innerHTML = `
                        <div class="flex justify-between items-start border-b border-gray-700 pb-2 mb-2">
                            <div>
                                <h3 class="font-bold text-gray-100">${data.name}</h3>
                                <p class="text-xs text-gray-500">${data.date}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-xs bg-yellow-500/10 text-yellow-500 px-2 py-0.5 rounded">${data.gonda} গন্ডা</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-center text-sm">
                            <div>
                                <p class="text-gray-500 text-[10px] uppercase">মোট</p>
                                <p class="font-semibold">৳${data.total}</p>
                            </div>
                            <div>
                                <p class="text-gray-500 text-[10px] uppercase text-green-500">নগদ</p>
                                <p class="font-semibold text-green-500">৳${data.cash}</p>
                            </div>
                            <div>
                                <p class="text-gray-500 text-[10px] uppercase text-red-500">বাকি</p>
                                <p class="font-semibold text-red-500">৳${data.due}</p>
                            </div>
                        </div>
                    `;
                    listContainer.appendChild(card);
                    cursor.continue();
                } else if (listContainer.innerHTML === '') {
                    listContainer.innerHTML = '<p class="text-center text-gray-600 py-10 italic">কোনো তথ্য পাওয়া যায়নি</p>';
                }
            };
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const transaction = db.transaction(["records"], "readonly");
            const store = transaction.objectStore("records");
            
            let totalSell = 0, totalCash = 0, totalDue = 0, totalGonda = 0;

            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    if (cursor.value.date === today) {
                        totalSell += cursor.value.total;
                        totalCash += cursor.value.cash;
                        totalDue += cursor.value.due;
                        totalGonda += cursor.value.gonda;
                    }
                    cursor.continue();
                } else {
                    document.getElementById('stat-total').innerText = `৳${totalSell}`;
                    document.getElementById('stat-cash').innerText = `৳${totalCash}`;
                    document.getElementById('stat-due').innerText = `৳${totalDue}`;
                    document.getElementById('stat-gonda').innerText = totalGonda;
                }
            };
        }

        function toggleFilter() {
            filterActive = !filterActive;
            const btn = document.getElementById('baki-filter-btn');
            const title = document.getElementById('list-title');
            
            if(filterActive) {
                btn.innerText = "সবগুলো দেখান";
                btn.classList.replace('bg-red-500/20', 'bg-blue-500/20');
                btn.classList.replace('text-red-400', 'text-blue-400');
                title.innerText = "বাকি কাস্টমার লিস্ট";
            } else {
                btn.innerText = "বাকি কাস্টমার";
                btn.classList.replace('bg-blue-500/20', 'bg-red-500/20');
                btn.classList.replace('text-blue-400', 'text-red-400');
                title.innerText = "সকল কাস্টমার লিস্ট";
            }
            renderList();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function exportData() {
            const transaction = db.transaction(["records"], "readonly");
            const store = transaction.objectStore("records");
            const data = [];

            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    data.push(cursor.value);
                    cursor.continue();
                } else {
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `harvester_pro_backup_${new Date().toLocaleDateString()}.json`;
                    a.click();
                }
            };
        }
    </script>
</body>
</html>
